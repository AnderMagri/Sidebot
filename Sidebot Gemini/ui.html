<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: sans-serif; padding: 15px; background: #fff; }
    h3 { font-size: 13px; margin: 0 0 10px 0; color: #333; }
    input, textarea { 
      width: 100%; box-sizing: border-box; margin-bottom: 8px; 
      padding: 8px; border: 1px solid #e5e5e5; border-radius: 4px; font-size: 11px;
    }
    textarea { height: 70px; resize: none; }
    button { 
      width: 100%; padding: 10px; border: none; border-radius: 6px; 
      background: #18A0FB; color: white; font-weight: 600; cursor: pointer; 
    }
    button:hover { background: #0d8de3; }
    #status { 
      margin-top: 10px; font-size: 10px; color: #666; 
      background: #f5f5f5; padding: 8px; border-radius: 4px; 
      min-height: 20px; word-break: break-all;
    }
  </style>
</head>
<body>
  <h3>Gemini 3 Copilot</h3>
  <input type="password" id="apiKey" placeholder="Paste Gemini API Key">
  <textarea id="userPrompt" placeholder="e.g. 'Make these buttons red'"></textarea>
  <button id="runBtn">Execute Command</button>
  <div id="status">Ready. Select layers and click Run.</div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const status = document.getElementById('status');

    runBtn.onclick = () => {
      const key = document.getElementById('apiKey').value;
      if (!key) { status.innerText = "Error: API Key required."; return; }
      
      status.innerText = "Reading Figma context...";
      // Request current layer data from code.js
      parent.postMessage({ pluginMessage: { type: 'get-context' } }, '*');
    };

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'context-data') {
        const apiKey = document.getElementById('apiKey').value;
        const promptText = document.getElementById('userPrompt').value;
        const designContext = JSON.stringify(msg.data);

        status.innerText = "Sending to Gemini 3 Flash...";

        try {
          // 2026 STABLE ENDPOINT: Using gemini-3-flash-preview
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${apiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `You are a Figma Copilot. Design Context (JSON): ${designContext}. 
                  Instruction: ${promptText}. 
                  Output ONLY a JSON array of changes: [{"id": "id", "color": "#hex", "x": 100, "text": "new text"}]. 
                  No markdown, no explanation.`
                }]
              }]
            })
          });

          const result = await response.json();

          // FIX: Prevent TypeError by checking for valid candidates
          if (!result.candidates || !result.candidates[0]) {
            const err = result.error ? result.error.message : "Model returned no data.";
            status.innerText = "API Error: " + err;
            return;
          }

          const rawText = result.candidates[0].content.parts[0].text;
          const cleanJson = JSON.parse(rawText.replace(/```json|```/g, '').trim());
          
          status.innerText = "Applying changes...";
          parent.postMessage({ pluginMessage: { type: 'apply-changes', changes: cleanJson } }, '*');
        } catch (err) {
          status.innerText = "Error: " + err.message;
          console.error("Fetch Error:", err);
        }
      }
    };
  </script>
</body>
</html>
