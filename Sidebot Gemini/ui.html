<!DOCTYPE html>
<html>
<head>
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; 
      padding: 15px; 
      background: #2c2c2c; 
      color: #fff;
      margin: 0;
    }
    h3 { 
      font-size: 13px; 
      margin: 0 0 12px 0; 
      color: #fff; 
      font-weight: 600;
    }
    a {
      color: #18A0FB;
      text-decoration: none;
    }
    a:hover {
      text-decoration: underline;
    }
    input, textarea { 
      width: 100%; 
      box-sizing: border-box; 
      margin-bottom: 8px; 
      padding: 8px; 
      border: 1px solid #3c3c3c; 
      border-radius: 4px; 
      font-size: 11px;
      background: #1e1e1e;
      color: #fff;
      font-family: inherit;
    }
    input[type="radio"] {
      accent-color: #18A0FB;
      cursor: pointer;
    }
    input:focus, textarea:focus {
      outline: none;
      border-color: #18A0FB;
    }
    input::placeholder, textarea::placeholder {
      color: #888;
    }
    .key-row { display: flex; gap: 5px; margin-bottom: 8px; }
    .key-row input { flex: 1; margin-bottom: 0; }
    .key-row button { 
      width: auto; 
      padding: 8px 16px; 
      background: #18A0FB; 
      color: #fff; 
      font-size: 11px; 
      font-weight: 600;
      border: none;
    }
    .key-row button:hover { background: #0d8de3; }
    textarea { height: 70px; resize: none; }
    button { 
      width: 100%; 
      padding: 10px; 
      border: none; 
      border-radius: 6px; 
      background: #18A0FB; 
      color: white; 
      font-weight: 600; 
      cursor: pointer;
      font-family: inherit;
    }
    button:hover { background: #0d8de3; }
    button:active { background: #0b7bc4; }
    button:disabled {
      background: #3c3c3c;
      color: #666;
      cursor: not-allowed;
    }
    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <!-- Beta Warning Banner -->
  <div style="background: #3c2a00; border: 1px solid #8b6914; border-radius: 4px; padding: 8px 10px; margin-bottom: 12px; font-size: 10px; color: #ffd666;">
    <strong>⚠️ BETA:</strong> This plugin is in beta. Save your work before using. 
    <a href="#" id="betaInfo" style="color: #ffd666; text-decoration: underline;">Learn more</a>
  </div>

  <h3>Sidebot Gemini</h3>
  
  <!-- API Key Section (shown when no key saved) -->
  <div id="apiKeySection">
    <div style="font-size: 10px; color: #888; margin-bottom: 6px;">
      Get your API key at: <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color: #18A0FB;">aistudio.google.com/app/apikey</a>
    </div>
    <div style="font-size: 9px; color: #ffd666; background: #3c2a00; padding: 6px 8px; border-radius: 3px; margin-bottom: 6px; border: 1px solid #8b6914;">
      ⚠️ Use a personal API key. It's visible in network requests (normal for client-side apps).
    </div>
    <div class="key-row">
      <input type="password" id="apiKey" placeholder="Paste your Gemini API Key">
      <button id="saveKeyBtn">Save</button>
    </div>
  </div>

  <!-- Saved Key Indicator (shown when key is saved) -->
  <div id="savedKeySection" style="display: none;">
    <div style="font-size: 11px; color: #18A0FB; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
      <span>✓ API Key saved</span>
      <button id="changeKeyBtn" style="width: auto; padding: 4px 8px; background: #3c3c3c; font-size: 10px; border: 1px solid #4c4c4c;">Change</button>
    </div>
  </div>

  <!-- Scope Selection -->
  <div style="margin-bottom: 8px;">
    <div style="font-size: 10px; color: #888; margin-bottom: 4px;">Apply to:</div>
    <div style="display: flex; gap: 12px;">
      <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 11px;">
        <input type="radio" name="scope" value="selection" checked style="width: auto; margin: 0;">
        <span>Selected layers</span>
      </label>
      <label style="display: flex; align-items: center; gap: 4px; cursor: pointer; font-size: 11px;">
        <input type="radio" name="scope" value="page" style="width: auto; margin: 0;">
        <span>Current page</span>
      </label>
    </div>
  </div>

  <textarea id="userPrompt" placeholder="e.g. 'Make these buttons red'"></textarea>
  <button id="runBtn">Execute Command</button>
  
  <!-- Status with spinner -->
  <div style="margin-top: 10px; display: flex; align-items: center; gap: 8px; min-height: 20px;">
    <div id="spinner" style="display: none;">
      <svg width="14" height="14" viewBox="0 0 14 14" style="animation: spin 1s linear infinite;">
        <circle cx="7" cy="7" r="5" stroke="#18A0FB" stroke-width="2" fill="none" stroke-dasharray="20 10" />
      </svg>
    </div>
    <div id="status" style="font-size: 11px; color: #b3b3b3;"></div>
  </div>

  <script>
    const runBtn = document.getElementById('runBtn');
    const saveKeyBtn = document.getElementById('saveKeyBtn');
    const changeKeyBtn = document.getElementById('changeKeyBtn');
    const status = document.getElementById('status');
    const spinner = document.getElementById('spinner');
    const apiKeyInput = document.getElementById('apiKey');
    const apiKeySection = document.getElementById('apiKeySection');
    const savedKeySection = document.getElementById('savedKeySection');

    let savedApiKey = null;

    // Helper functions for spinner
    function showSpinner() {
      spinner.style.display = 'block';
    }
    
    function hideSpinner() {
      spinner.style.display = 'none';
    }
    
    function setStatus(message, showLoader = false) {
      status.innerText = message;
      if (showLoader) {
        showSpinner();
      } else {
        hideSpinner();
      }
    }

    // Load saved API key on startup
    parent.postMessage({ pluginMessage: { type: 'load-api-key' } }, '*');

    // Save API key and validate it
    saveKeyBtn.onclick = async () => {
      const key = apiKeyInput.value.trim();
      if (!key) { 
        setStatus("❌ Please enter an API key."); 
        return; 
      }

      setStatus("Validating API key...", true);
      saveKeyBtn.disabled = true;

      try {
        // Test the API key with a simple request
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${key}`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            contents: [{ parts: [{ text: "test" }] }]
          })
        });

        const result = await response.json();

        if (response.ok || (result.error && result.error.code !== 400 && result.error.message.includes('API key'))) {
          // Key is valid or error is not about the key being invalid
          if (result.error && result.error.message && result.error.message.toLowerCase().includes('api key not valid')) {
            setStatus("❌ Invalid API key. Please check and try again.");
            saveKeyBtn.disabled = false;
            return;
          }

          // Save the key
          savedApiKey = key;
          parent.postMessage({ pluginMessage: { type: 'save-api-key', key: key } }, '*');
          
          // Hide API key section, show saved indicator
          apiKeySection.style.display = 'none';
          savedKeySection.style.display = 'block';
          setStatus("✅ API key saved successfully!");
        } else if (result.error && result.error.message && result.error.message.toLowerCase().includes('api key')) {
          setStatus("❌ Invalid API key. Please check and try again.");
          saveKeyBtn.disabled = false;
        } else {
          // Some other error, but key format seems OK
          savedApiKey = key;
          parent.postMessage({ pluginMessage: { type: 'save-api-key', key: key } }, '*');
          apiKeySection.style.display = 'none';
          savedKeySection.style.display = 'block';
          setStatus("✅ API key saved!");
        }
      } catch (err) {
        setStatus("⚠️ Couldn't validate key, but saving anyway: " + err.message);
        savedApiKey = key;
        parent.postMessage({ pluginMessage: { type: 'save-api-key', key: key } }, '*');
        apiKeySection.style.display = 'none';
        savedKeySection.style.display = 'block';
      } finally {
        saveKeyBtn.disabled = false;
      }
    };

    // Change API key
    changeKeyBtn.onclick = () => {
      apiKeySection.style.display = 'block';
      savedKeySection.style.display = 'none';
      apiKeyInput.value = '';
      apiKeyInput.type = 'password';
      parent.postMessage({ pluginMessage: { type: 'clear-api-key' } }, '*');
      savedApiKey = null;
      setStatus("Enter your new API key.");
    };

    runBtn.onclick = () => {
      if (!savedApiKey) {
        setStatus("❌ Please save your API key first.");
        return;
      }
      
      const scope = document.querySelector('input[name="scope"]:checked').value;
      
      setStatus("Reading Figma context...", true);
      // Request current layer data from code.js
      parent.postMessage({ pluginMessage: { type: 'get-context', scope: scope } }, '*');
    };

    window.onmessage = async (event) => {
      const msg = event.data.pluginMessage;

      if (msg.type === 'context-data') {
        const promptText = document.getElementById('userPrompt').value;
        const designContext = JSON.stringify(msg.data);

        setStatus(`Sending ${msg.data.length} layers to Gemini...`, true);
        
        // Small delay so user sees the status
        await new Promise(r => setTimeout(r, 300));

        try {
          // 2026 STABLE ENDPOINT: Using gemini-3-flash-preview
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3-flash-preview:generateContent?key=${savedApiKey}`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              contents: [{
                parts: [{
                  text: `You are a Figma Copilot. Design Context (JSON): ${designContext}. 
                  
User Instruction: ${promptText}

IMPORTANT RULES:

COLORS:
- fillColors = background/fill colors
- strokeColors = border/outline colors
- Use "fillColor" to change background
- Use "strokeColor" to change border

FONTS & TEXT:
- Use "fontFamily" and "fontStyle" to change fonts
- Use "text" to change text content

POSITIONING:
- Use "x" and "y" for absolute position
- Use "width" and "height" to resize

AUTO LAYOUT (for FRAME, COMPONENT, INSTANCE nodes):
- Use "layoutMode": "HORIZONTAL" or "VERTICAL" to enable Auto Layout
- Use "layoutMode": "NONE" to disable Auto Layout
- Use "itemSpacing": number for gap between children (e.g., 16)
- Use "layoutPadding": number for all sides OR {"top": 20, "right": 20, "bottom": 20, "left": 20}
- Use "primaryAxisAlignItems": "MIN" (left/top), "CENTER", "MAX" (right/bottom), or "SPACE_BETWEEN"
- Use "counterAxisAlignItems": "MIN", "CENTER", or "MAX"

CHILD ALIGNMENT (for nodes inside Auto Layout):
- Use "layoutAlign": "MIN", "CENTER", "MAX", or "STRETCH" to align within parent
- Use "layoutGrow": 1 to fill available space, 0 for fixed size

EXAMPLES:
Center align children: {"id": "frame_id", "primaryAxisAlignItems": "CENTER", "counterAxisAlignItems": "CENTER"}
Add padding: {"id": "frame_id", "layoutPadding": 24}
Enable Auto Layout: {"id": "frame_id", "layoutMode": "VERTICAL", "itemSpacing": 16}
Center child in parent: {"id": "child_id", "layoutAlign": "CENTER"}

Output ONLY a JSON array of changes:
[{"id": "node_id", "fillColor": "#FF0000", "layoutMode": "VERTICAL", "itemSpacing": 16, "primaryAxisAlignItems": "CENTER"}]

Include only the fields that need to change. No markdown, no explanation, no preamble.`
                }]
              }]
            })
          });

          const result = await response.json();

          // Handle HTTP errors
          if (!response.ok) {
            let errorMsg = "API Error";
            if (response.status === 503) {
              errorMsg = "❌ Gemini API is temporarily unavailable (503). Please try again in a moment.";
            } else if (response.status === 429) {
              errorMsg = "❌ Rate limit exceeded. Please wait before trying again.";
            } else if (response.status === 401 || response.status === 403) {
              errorMsg = "❌ Invalid API key. Please check your key and try again.";
            } else if (result.error) {
              errorMsg = `❌ API Error: ${result.error.message}`;
            }
            setStatus(errorMsg);
            return;
          }

          // FIX: Prevent TypeError by checking for valid candidates
          if (!result.candidates || !result.candidates[0]) {
            const err = result.error ? result.error.message : "Model returned no data.";
            setStatus("❌ API Error: " + err);
            return;
          }

          const rawText = result.candidates[0].content.parts[0].text;
          const cleanJson = JSON.parse(rawText.replace(/```json|```/g, '').trim());
          
          setStatus(`Got ${cleanJson.length} changes, applying...`, true);
          await new Promise(r => setTimeout(r, 300));
          
          parent.postMessage({ pluginMessage: { type: 'apply-changes', changes: cleanJson } }, '*');
        } catch (err) {
          setStatus("❌ Error: " + err.message);
          console.error("Fetch Error:", err);
        }
      }
      
      // Listen for completion from plugin
      if (msg.type === 'changes-applied') {
        setStatus(msg.message);
      }

      // Listen for loaded API key
      if (msg.type === 'api-key-loaded') {
        if (msg.key) {
          savedApiKey = msg.key;
          apiKeySection.style.display = 'none';
          savedKeySection.style.display = 'block';
          setStatus("Ready. Select layers and click Execute.");
        } else {
          apiKeySection.style.display = 'block';
          savedKeySection.style.display = 'none';
          setStatus("Enter your API key to get started.");
        }
      }
    };
  </script>
</body>
</html>
